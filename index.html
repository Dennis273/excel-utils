<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }
    </style>
  </head>
  <body>
    <h1>Get Colored Texts from Excel sheet</h1>

    <div>Steps:</div>
    <ol>
      <li>Select the color you want to find</li>
      <li>Select all and copy the Excel sheet</li>
      <li>Click the button below</li>
      <li>Get colored texts in the textarea below</li>
    </ol>
    <div>
      <button type="button" id="copy-button">I've copied the sheet.</button>
    </div>
    <iframe id="html-insert" style="position:absolute;left:-9999px;width:1px;height:1px" sandbox="allow-same-origin"></iframe>
    <div id="target-color-input">
      <label for="target-color">Target Color:</label>
      <input type="color" id="target-color" value="#ff0000" />
    </div>

    <div>Result:</div>
    <textarea id="output" readonly style="height: 200px"></textarea>

    <details id="debug-details" style="margin-top: 10px">
      <summary style="cursor: pointer; color: #666">Debug Info</summary>
      <pre id="debug" style="background:#f4f4f4; padding:8px; font-size:12px; white-space:pre-wrap; word-break:break-all; max-height:300px; overflow:auto">(not run yet)</pre>
      <button type="button" id="export-debug" disabled>Export Debug File</button>
    </details>

    <script>
      const hexToRgb = (hex) => {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        if (!result) {
          throw new Error(`Invalid color: ${hex}`);
        }
        const r = parseInt(result[1], 16);
        const g = parseInt(result[2], 16);
        const b = parseInt(result[3], 16);
        return { r, g, b };
      };

      const parseRgb = (rgb) => {
        const result = /^rgba?\((\d+),\s*(\d+),\s*(\d+)/.exec(rgb);
        if (!result) {
          throw new Error(`Invalid color: ${rgb}`);
        }
        return {
          r: parseInt(result[1]),
          g: parseInt(result[2]),
          b: parseInt(result[3]),
        };
      };

      const output = document.getElementById("output");
      const debugEl = document.getElementById("debug");
      const debugDetails = document.getElementById("debug-details");
      const htmlInsert = document.getElementById("html-insert");
      const copyButton = document.getElementById("copy-button");
      const targetColorInput = document.getElementById("target-color");
      const exportDebugBtn = document.getElementById("export-debug");

      const logLines = [];
      let lastClipboardHtml = "";
      const log = (...args) => {
        const line = args.join(" ");
        console.log(line);
        logLines.push(line);
      };
      const flushLog = () => {
        debugEl.textContent = logLines.join("\n");
      };

      exportDebugBtn.addEventListener("click", () => {
        const content =
          "=== DEBUG LOG ===\n" +
          logLines.join("\n") +
          "\n\n=== CLIPBOARD HTML ===\n" +
          lastClipboardHtml;
        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "debug-" + new Date().toISOString().slice(0, 19).replace(/:/g, "-") + ".txt";
        a.click();
        URL.revokeObjectURL(url);
      });

      copyButton.addEventListener("click", async () => {
        logLines.length = 0;
        lastClipboardHtml = "";
        debugEl.textContent = "";
        output.value = "";
        exportDebugBtn.disabled = true;
        try {
          const targetColor = targetColorInput.value;
          log("[1] Target color:", targetColor);

          const clipboardItems = await navigator.clipboard.read();
          log("[2] Clipboard items:", clipboardItems.length);
          clipboardItems.forEach((item, i) => {
            log(`    item[${i}] types:`, item.types.join(", "));
          });

          const textHtmlInClipboard = clipboardItems.find((item) =>
            item.types.includes("text/html")
          );

          if (!textHtmlInClipboard) {
            log("[!] No text/html found in clipboard");
            flushLog();
            alert("No HTML in clipboard");
            return;
          }

          const textHtmlBlob = await textHtmlInClipboard.getType("text/html");
          const textHtml = await textHtmlBlob.text();
          lastClipboardHtml = textHtml;
          log("[3] HTML length:", textHtml.length, "chars");

          // Write into iframe so <style> blocks in the Excel HTML are properly applied.
          // Using innerHTML on a div strips the <html>/<head> structure, losing class-based styles
          // (Windows Excel uses class-based styles; Mac Excel uses inline styles).
          const iframeDoc = htmlInsert.contentDocument;
          if (!iframeDoc) {
            throw new Error("iframe contentDocument not available");
          }
          iframeDoc.open();
          iframeDoc.write(textHtml);
          iframeDoc.close();

          // Only inspect leaf elements that carry visible text — skips <head>, <style>,
          // <script>, <col>, etc. and avoids duplicate text from ancestor elements.
          const leafElements = Array.from(iframeDoc.querySelectorAll("*")).filter(
            (el) => el.children.length === 0 && el.textContent.trim() !== ""
          );
          log("[4] Leaf text elements:", leafElements.length);

          const targetColorRgb = hexToRgb(targetColor);
          log("[5] Target RGB:", JSON.stringify(targetColorRgb));

          const matchedTexts = [];
          leafElements.forEach((el) => {
            const color = htmlInsert.contentWindow.getComputedStyle(el).color;
            let colorRgb;
            try {
              colorRgb = parseRgb(color);
            } catch {
              return;
            }
            if (
              colorRgb.r === targetColorRgb.r &&
              colorRgb.g === targetColorRgb.g &&
              colorRgb.b === targetColorRgb.b
            ) {
              matchedTexts.push(el.textContent);
            }
          });

          if (debugDetails.open) {
            const colorCounts = {};
            leafElements.forEach((el) => {
              const color = htmlInsert.contentWindow.getComputedStyle(el).color;
              colorCounts[color] = (colorCounts[color] || 0) + 1;
            });
            log("[6] Unique colors found:");
            Object.entries(colorCounts)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 10)
              .forEach(([c, n]) => log(`    ${c} × ${n}`));
          }

          log("[7] Matched elements:", matchedTexts.length);
          output.value = matchedTexts.join("\n");
        } catch (error) {
          log("[ERROR]", error.message);
          alert(error.message);
        }
        flushLog();
        exportDebugBtn.disabled = false;
      });
    </script>
  </body>
</html>
